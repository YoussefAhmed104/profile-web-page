<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>profile</title>
        <!-- css -->
        <link rel="stylesheet" href="style.css" />

        <!-- font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />

        <!-- icons -->
        <link
            rel="stylesheet"
            href="uicons-regular-rounded/css/uicons-regular-rounded.css"
        />
    </head>
    <body>
        <div class="container">
            <div class="navbar">
                <div class="right">
                    <h1>Welcome, Youssef</h1>
                    <p>10,April 2009</p>
                </div>
                <div class="left">
                    <div class="search">
                        <i class="fi fi-rr-search"></i>

                    </div>
                    <img src="photos/IMG_20260309_111445.jpg" alt="" />
                </div>
            </div>
            <div class="body">
                <div class="top"></div>
                <div class="content">
                    <div class="main">
                        <div class="card">
                            <div class="photo">
                                <img src="photos/profile.jpg" alt="" />
                            </div>
                            <div class="info">
                                <h1>Youssef Ahmed</h1>
                                <p>youssefahmed104@gmail.com</p>
                            </div>
                        </div>
                        <input type="button" value="Edit" />
                    </div>
                    <div class="full-info">
                        <div class="field">
                            <h2>Full name</h2>
                            <div class="name"><p>Youssef Ahmed Mohamed</p></div>
                        </div>
                        <div class="field">
                            <h2>nick name</h2>
                            <div class="name"><p>Joo</p></div>
                        </div>
                        <div class="field">
                            <h2>School</h2>
                            <div class="name">
                                <p>STEM High School for Boys</p>
                            </div>
                        </div>
                        <div class="field">
                            <h2>country</h2>
                            <div class="name"><p>Egypt</p></div>
                        </div>
                        <div class="field">
                            <h2>Language</h2>
                            <div class="name"><p>Arabic</p></div>
                        </div>
                        <div class="field">
                            <h2>Gender</h2>
                            <div class="name"><p>male</p></div>
                        </div>
                    </div>
                    <div class="further-info">
                        <div class="cards">
                            <div class="card-1">
                                <h1>My email adress</h1>
                                <div class="cont">
                                    <div class="icon">
                                        <i class="fi fi-rr-email-feedback"></i>
                                    </div>
                                    <p>youssefahmed104@gmail.com</p>
                                </div>
                            </div>
                            <div class="card-1">
                                <h1>My Phone num</h1>
                                <div class="cont">
                                <div class="icon"><i class="fi fi-rr-phone-24h"></i></div>
                                <p>01151490174</p>
                                </div>
                            </div>
                        </div>
                        <div class="more">
                            <input type="button" value="+Add more info" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
